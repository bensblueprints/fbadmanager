version: "3.9"

services:
  fbad-frontend:
    build: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fbad.rule=Host(`facebook.advancedmarketing.co`)"
      - "traefik.http.routers.fbad.entrypoints=websecure"
      - "traefik.http.routers.fbad.tls.certresolver=letsencrypt"
      - "traefik.http.services.fbad.loadbalancer.server.port=80"
    networks:
      - traefik
    restart: unless-stopped

  fbad-backend:
    build: ./backend
    env_file: ./backend/.env
    networks:
      - traefik
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: cloud-computer-community_default
